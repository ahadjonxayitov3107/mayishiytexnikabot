<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Kirish — Admin panel</title>
{% include 'admin/partials/style.html' %}
</head>
<body>
<div class="container">
  <div class="card login-card">
    <h1>🔐 Admin panelga kirish</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Login</label>
      <input type="text" name="username" required autofocus>
      <label>Parol</label>
      <input type="password" name="password" required>
      <button class="btn" style="margin-top:16px; width:100%;" type="submit">Kirish</button>
    </form>
  </div>
</div>
</body>
</html>
